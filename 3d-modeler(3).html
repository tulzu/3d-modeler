}
function pointInLasso(px,py){
  return pointInPoly(px,py,lassoPoints);
}
function applyLassoSelection(additive){
  if(!selectedObj||lassoPoints.length<3)return;
  const W=canvas.width,H=canvas.height;
  const mObj=getObjectMatrix(selectedObj);
  const worldVerts=selectedObj.verts.map(v=>mat4transform(mObj,v));
  const projVerts=worldVerts.map(v=>project(v,W,H));
  if(!additive) editSelection.clear();
  if(subMode==='vertex'){
    projVerts.forEach((p,i)=>{
      if(p&&pointInLasso(p.x,p.y)) editSelection.add(i);
    });
  } else if(subMode==='edge'){
    selectedObj.edges.forEach((e,i)=>{
      const p1=projVerts[e[0]],p2=projVerts[e[1]];
      if(p1&&p2&&pointInLasso(p1.x,p1.y)&&pointInLasso(p2.x,p2.y)) editSelection.add(i);
    });
  } else if(subMode==='face'){
    selectedObj.faces.forEach((face,fi)=>{
      const pts=face.map(i=>projVerts[i]).filter(p=>p);
      if(pts.length>=3&&pts.every(p=>pointInLasso(p.x,p.y))) editSelection.add(fi);
    });
  }
  render();
}

// ========== NORMALS ==========
function flipNormals(){
  // Flip selected faces (edit mode) or all faces (object mode)
  if(!selectedObj){toast('Select an object');return;}
  pushUndo();
  const obj=selectedObj;
  if(mode==='edit'&&editSelection.size>0&&subMode==='face'){
    editSelection.forEach(fi=>{
      obj.faces[fi]=obj.faces[fi].slice().reverse();
    });
    toast('Selected face normals flipped ✓');
  } else {
    obj.faces=obj.faces.map(f=>f.slice().reverse());
    toast('All face normals flipped ✓');
  }
  render();
}

function recalcNormals(){
  // Flood-fill winding consistency — propagates correct winding from face to face
  // via shared edges. Doesn't rely on mesh centroid so works on any shape.
  if(!selectedObj){toast('Select an object');return;}
  pushUndo();
  const obj=selectedObj;
  const F=obj.faces;
  const n=F.length;
  if(n===0)return;

  // Build edge→face adjacency: for each directed edge (a→b) store which face owns it
  // A well-wound face has edge a→b; its neighbour should have b→a for that shared edge
  const edgeFace=new Map(); // "a,b" → faceIndex (directed)
  F.forEach((face,fi)=>{
    for(let i=0;i<face.length;i++){
      const a=face[i],b=face[(i+1)%face.length];
      edgeFace.set(a+','+b,fi);
    }
  });

  // Flood fill: start from face 0, propagate winding
  const visited=new Array(n).fill(false);
  const flipped=new Array(n).fill(false);
  const queue=[0];
  visited[0]=true;

  while(queue.length){
    const fi=queue.shift();
    const face=F[fi];
    for(let i=0;i<face.length;i++){
      const a=face[i],b=face[(i+1)%face.length];
      // Neighbour should have edge b→a
      const ni=edgeFace.get(b+','+a); // correctly wound neighbour
      const ni2=edgeFace.get(a+','+b); // same-direction = needs flip
      const neighbour = ni!==undefined&&ni!==fi ? ni : (ni2!==undefined&&ni2!==fi ? ni2 : undefined);
      if(neighbour===undefined||visited[neighbour])continue;
      visited[neighbour]=true;
      // If neighbour shares edge in same direction as current face → mismatched winding
      if(edgeFace.get(a+','+b)===neighbour){
        flipped[neighbour]=!flipped[fi]; // flip relative to current
      } else {
        flipped[neighbour]=flipped[fi];
      }
      queue.push(neighbour);
    }
  }

  // Apply flips
  let flipCount=0;
  F.forEach((face,fi)=>{if(flipped[fi]){F[fi]=face.slice().reverse();flipCount++;}});

  // Final pass: make sure majority of normals point outward (centroid check on result)
  const centroid=obj.verts.reduce((s,v)=>v3add(s,v),V3(0,0,0));
  const mc=v3mul(centroid,1/Math.max(1,obj.verts.length));
  let outCount=0,inCount=0;
  F.forEach(face=>{
    if(face.length<3)return;
    const v0=obj.verts[face[0]],v1=obj.verts[face[1]],v2=obj.verts[face[2]];
    const nn=v3norm(v3cross(v3sub(v1,v0),v3sub(v2,v0)));
    const fc=v3mul(face.reduce((s,i)=>v3add(s,obj.verts[i]),V3(0,0,0)),1/face.length);
    if(v3dot(nn,v3sub(fc,mc))>0)outCount++;else inCount++;
  });
  // If majority point inward, flip everything
  if(inCount>outCount){
    F.forEach((face,fi)=>{F[fi]=face.slice().reverse();});
    flipCount=n-flipCount;
  }

  rebuildEdges(obj);
  toast('Normals recalculated — '+flipCount+' faces fixed ✓');
  render();
}

// ========== MOBILE / TOUCH ==========
let touch={
  active: new Map(), // id -> {x,y}
  lastDist: 0,
  lastMidX: 0,
  lastMidY: 0,
  lastSingleX: 0,
  lastSingleY: 0,
  tapTimer: null,
  longPressTimer: null,
  moved: false
};

function toggleSidebar(){
  const sb=document.getElementById('sidebar');
  sb.classList.toggle('open');
}

function setMobileActive(id){
  document.querySelectorAll('.mb-btn').forEach(b=>b.classList.remove('active'));
  const el=document.getElementById(id);
  if(el) el.classList.add('active');
}

function getTouchCenter(touches){
  let x=0,y=0;
  touches.forEach(t=>{x+=t.clientX;y+=t.clientY;});
  return {x:x/touches.length, y:y/touches.length};
}

function getTouchDist(touches){
  const arr=[...touches];
  if(arr.length<2) return 0;
  const dx=arr[0].clientX-arr[1].clientX;
  const dy=arr[0].clientY-arr[1].clientY;
  return Math.sqrt(dx*dx+dy*dy);
}

function canvasToLocal(cx,cy){
  const rect=canvas.getBoundingClientRect();
  const x=(cx-rect.left)*(canvas.width/rect.width);
  const y=(cy-rect.top)*(canvas.height/rect.height);
  return {x,y};
}

function initTouchEvents(){
  canvas.addEventListener('touchstart',e=>{
    e.preventDefault();
    [...e.changedTouches].forEach(t=>touch.active.set(t.identifier,{x:t.clientX,y:t.clientY}));
    touch.moved=false;

    if(touch.active.size===1){
      const t0=[...touch.active.values()][0];
      const lp=canvasToLocal(t0.x,t0.y);
      touch.lastSingleX=lp.x;
      touch.lastSingleY=lp.y;

      // Sculpt mode: start painting
      if(mode==='sculpt'){
        pushUndoDebounced();
        sculpt.painting=true;
        applySculptBrush(lp.x,lp.y);
        render();
        drawSculptCursor(lp.x,lp.y,canvas.width,canvas.height);
        return;
      }

      // Long press → context menu
      touch.longPressTimer=setTimeout(()=>{
        if(!touch.moved){
          const menu=document.getElementById('ctx-menu');
          menu.style.display='block';
          menu.style.left=t0.x+'px';
          menu.style.top=t0.y+'px';
        }
      },600);

    } else if(touch.active.size===2){
      clearTimeout(touch.longPressTimer);
      if(sculpt.painting){sculpt.painting=false;}
      const arr=[...touch.active.values()];
      touch.lastDist=getTouchDist(e.touches);
      const mid=getTouchCenter(e.touches);
      const lm=canvasToLocal(mid.x,mid.y);
      touch.lastMidX=lm.x;
      touch.lastMidY=lm.y;
    }
  },{passive:false});

  canvas.addEventListener('touchmove',e=>{
    e.preventDefault();
    [...e.changedTouches].forEach(t=>touch.active.set(t.identifier,{x:t.clientX,y:t.clientY}));
    touch.moved=true;
    clearTimeout(touch.longPressTimer);

    if(touch.active.size===1){
      const t0=[...touch.active.values()][0];
      const lp=canvasToLocal(t0.x,t0.y);
      const dx=lp.x-touch.lastSingleX;
      const dy=lp.y-touch.lastSingleY;

      if(mode==='sculpt'&&sculpt.painting){
        applySculptBrush(lp.x,lp.y);
        render();
        drawSculptCursor(lp.x,lp.y,canvas.width,canvas.height);
      } else if(gizmo.active){
        updateGizmo(lp.x,lp.y);
        gizmo.lastMouse={x:lp.x,y:lp.y};
        render();
      } else {
        // 1-finger orbit (right-hand viewport area)
        const rect=canvas.getBoundingClientRect();
        const relX=(t0.clientX-rect.left)/rect.width;
        if(relX>0.15){ // avoid toolbar area
          camera.azimuth-=dx*0.008;
          camera.elevation=Math.max(-1.5,Math.min(1.5,camera.elevation+dy*0.008));
          render();
        }
      }
      touch.lastSingleX=lp.x;
      touch.lastSingleY=lp.y;

    } else if(touch.active.size===2){
      const newDist=getTouchDist(e.touches);
      const mid=getTouchCenter(e.touches);
      const lm=canvasToLocal(mid.x,mid.y);

      // Pinch = zoom
      if(touch.lastDist>0){
        const ratio=newDist/touch.lastDist;
        camera.distance=Math.max(0.5,Math.min(80,camera.distance/ratio));
      }

      // 2-finger pan
      const pdx=lm.x-touch.lastMidX;
      const pdy=lm.y-touch.lastMidY;
      const {right,up}=getViewMatrix();
      const speed=camera.distance*0.004;
      camera.target=v3sub(camera.target,v3mul(right,pdx*speed));
      camera.target=v3add(camera.target,v3mul(up,pdy*speed));

      touch.lastDist=newDist;
      touch.lastMidX=lm.x;
      touch.lastMidY=lm.y;
      render();
    }
  },{passive:false});

  canvas.addEventListener('touchend',e=>{
    e.preventDefault();
    [...e.changedTouches].forEach(t=>touch.active.delete(t.identifier));
    clearTimeout(touch.longPressTimer);

    if(sculpt.painting&&touch.active.size===0){
      sculpt.painting=false;
      render();
    }
    if(gizmo.active&&touch.active.size===0){
      // Single tap while gizmo active = confirm
      if(!touch.moved) confirmGizmo();
    }
    if(touch.active.size===0) touch.lastDist=0;

    // Tap to select (if barely moved)
    if(!touch.moved&&touch.active.size===0&&mode!=='sculpt'&&!gizmo.active){
      const t0=e.changedTouches[0];
      const lp=canvasToLocal(t0.clientX,t0.clientY);
      if(mode==='object'&&tool==='select'){
        const hit=pickObject(lp.x,lp.y);
        selectObject(hit);
        render();
      } else if(mode==='edit'){
        const idx=pickEditElement(lp.x,lp.y);
        if(idx>=0){
          editSelection.clear();
          editSelection.add(idx);
          render();
        }
      }
    }
  },{passive:false});
}

// ========== SCULPT MODE ==========
const sculpt={
  brush:'draw', radius:60, strength:0.35,
  invert:false, xmirror:false, painting:false
};

function setSculptBrush(b){
  sculpt.brush=b;
  document.querySelectorAll('[id^="sbrush-"]').forEach(el=>el.classList.remove('btn-quad-active'));
  const el=document.getElementById('sbrush-'+b);
  if(el) el.classList.add('btn-quad-active');
  toast(b[0].toUpperCase()+b.slice(1)+' brush');
}

function sculptSubdivide(){
  if(!selectedObj){toast('Select an object');return;}
  if(selectedObj.verts.length>10000){toast('Too dense (>10k verts)');return;}
  pushUndo();
  const obj=selectedObj;
  const edgeMids=new Map();
  function getMid(a,b){
    const k=Math.min(a,b)+','+Math.max(a,b);
    if(!edgeMids.has(k)){
      obj.verts.push(v3mul(v3add(obj.verts[a],obj.verts[b]),0.5));
      edgeMids.set(k,obj.verts.length-1);
    }
    return edgeMids.get(k);
  }
  const nf=[];
  obj.faces.forEach(face=>{
    if(face.length===4){
      const m01=getMid(face[0],face[1]),m12=getMid(face[1],face[2]);
      const m23=getMid(face[2],face[3]),m30=getMid(face[3],face[0]);
      obj.verts.push(v3mul(face.reduce((s,i)=>v3add(s,obj.verts[i]),V3(0,0,0)),0.25));
      const cc=obj.verts.length-1;
      nf.push([face[0],m01,cc,m30],[face[1],m12,cc,m01],
               [face[2],m23,cc,m12],[face[3],m30,cc,m23]);
    } else if(face.length===3){
      const m01=getMid(face[0],face[1]),m12=getMid(face[1],face[2]),m20=getMid(face[2],face[0]);
      nf.push([face[0],m01,m20],[face[1],m12,m01],[face[2],m20,m12],[m01,m12,m20]);
    } else { nf.push(face); }
  });
  obj.faces=nf;
  rebuildEdges(obj);
  toast('Subdivided → '+obj.verts.length+' verts');
  render();
}

// Core sculpt: find which verts are within screen-space brush radius
// and apply brush effect to them in world space
function applySculptBrush(screenX, screenY){
  if(!selectedObj){
    // Auto select first object
    if(objects.length>0) selectObject(objects[0]);
    else return;
  }
  const obj=selectedObj;
  const mObj=getObjectMatrix(obj);
  const mInv=invertMat4Simple(mObj);
  const {vx,vy,vw,vh,cam}=getActiveViewport();

  // Project all verts to screen, find those within brush radius
  const str=sculpt.strength*(sculpt.invert?-1:1);
  const r=sculpt.radius;
  let changed=false;

  // Precompute per-vertex normals for normal-based brushes
  const worldVerts=obj.verts.map(v=>mat4transform(mObj,v));
  const vertNormals=worldVerts.map(()=>V3(0,0,0));
  obj.faces.forEach(face=>{
    if(face.length<3) return;
    const v0=worldVerts[face[0]],v1=worldVerts[face[1]],v2=worldVerts[face[2]];
    const n=v3norm(v3cross(v3sub(v1,v0),v3sub(v2,v0)));
    face.forEach(vi=>{ vertNormals[vi]=v3add(vertNormals[vi],n); });
  });
  for(let i=0;i<vertNormals.length;i++) vertNormals[i]=v3norm(vertNormals[i]);

  // For flatten/clay/scrape: average Y of verts in brush
  let flatSum=0, flatCount=0;
  if(sculpt.brush==='flatten'||sculpt.brush==='clay'||sculpt.brush==='scrape'){
    for(let vi=0;vi<worldVerts.length;vi++){
      const p=projectIn(worldVerts[vi],vx,vy,vw,vh,cam);
      if(!p) continue;
      const dx=p.x-vx-screenX, dy=p.y-vy-screenY;
      if(dx*dx+dy*dy < r*r){ flatSum+=worldVerts[vi].y; flatCount++; }
    }
  }
  const flatY=flatCount?flatSum/flatCount:0;

  // For smooth: precompute neighbor averages
  let neighborAvg=null;
  if(sculpt.brush==='smooth'){
    neighborAvg=worldVerts.map(v=>({x:v.x,y:v.y,z:v.z,n:1}));
    obj.edges.forEach(e=>{
      const a=worldVerts[e[0]],b=worldVerts[e[1]];
      neighborAvg[e[0]].x+=b.x; neighborAvg[e[0]].y+=b.y; neighborAvg[e[0]].z+=b.z; neighborAvg[e[0]].n++;
      neighborAvg[e[1]].x+=a.x; neighborAvg[e[1]].y+=a.y; neighborAvg[e[1]].z+=a.z; neighborAvg[e[1]].n++;
    });
  }

  for(let vi=0;vi<worldVerts.length;vi++){
    const wv=worldVerts[vi];
    // Project vert to screen
    const p=projectIn(wv,vx,vy,vw,vh,cam);
    if(!p) continue;
    // Distance from brush center in screen space
    const sdx=p.x-vx-screenX, sdy=p.y-vy-screenY;
    const sd2=sdx*sdx+sdy*sdy;
    if(sd2>=r*r) continue;
    const t=Math.sqrt(sd2)/r;
    const falloff=1-t*t*(3-2*t); // smoothstep

    // World-space move amount scaled by projected pixel size
    // Estimate: 1 unit world = how many pixels?
    const worldScale=cam.ortho
      ? Math.min(vw,vh)/(cam.distance*1.2)
      : (vh/2)/Math.tan(Math.PI/6)/Math.max(0.1,p.z);
    const unitMove=Math.max(0.0001, 1/Math.max(1,worldScale));

    const n=vertNormals[vi];
    let delta=V3(0,0,0);

    switch(sculpt.brush){
      case 'draw':
        delta=v3mul(n, str*falloff*r*unitMove*0.3);
        break;
      case 'smooth':{
        const s=neighborAvg[vi];
        const avg=V3(s.x/s.n,s.y/s.n,s.z/s.n);
        delta=v3mul(v3sub(avg,wv), Math.abs(str)*falloff*0.5);
        break;
      }
      case 'flatten':
        delta=V3(0,(flatY-wv.y)*falloff*str*0.6,0);
        break;
      case 'pinch':
        // Find geometric center of brush-affected verts
        delta=v3mul(v3sub(
          worldVerts.reduce((s,v,i)=>{
            const pp=projectIn(v,vx,vy,vw,vh,cam);
            if(!pp) return s;
            const dd=(pp.x-vx-screenX)**2+(pp.y-vy-screenY)**2;
            return dd<r*r?v3add(s,v):s;
          },V3(0,0,0)),
          v3mul(wv,1)
        ), Math.abs(str)*falloff*0.02);
        break;
      case 'inflate':
        delta=v3mul(n, str*falloff*r*unitMove*0.25);
        break;
      case 'crease':
        delta=v3mul(n, -Math.abs(str)*falloff*r*unitMove*0.3);
        break;
      case 'clay':
        delta=V3(0, Math.max(0,flatY+r*unitMove*0.05*str-wv.y)*falloff*0.5, 0);
        break;
      case 'scrape':
        if((str>0&&wv.y>flatY)||(str<0&&wv.y<flatY))
          delta=V3(0,(flatY-wv.y)*falloff*0.7,0);
        break;
    }

    if(!delta.x&&!delta.y&&!delta.z) continue;
    const newWorld=v3add(wv,delta);
    obj.verts[vi]=mat4transform(mInv,newWorld);

    // X-Mirror
    if(sculpt.xmirror){
      let bestMi=-1, bestD=Infinity;
      const mx2=2*cursor3D.x-wv.x;
      worldVerts.forEach((v2,j)=>{
        if(j===vi) return;
        const d=(v2.x-mx2)**2+(v2.y-wv.y)**2+(v2.z-wv.z)**2;
        if(d<bestD){bestD=d;bestMi=j;}
      });
      if(bestMi>=0&&bestD<(r*unitMove*2)**2){
        const mw=V3(2*cursor3D.x-newWorld.x,newWorld.y,newWorld.z);
        obj.verts[bestMi]=mat4transform(mInv,mw);
      }
    }
    changed=true;
  }
  if(changed){ rebuildEdges(obj); }
}

function drawSculptCursor(sx,sy){
  // sx,sy: raw canvas coordinates
  ctx.save();
  ctx.strokeStyle='rgba(255,255,255,0.9)';
  ctx.lineWidth=1.5;
  ctx.setLineDash([5,4]);
  ctx.beginPath();
  ctx.arc(sx,sy,sculpt.radius,0,Math.PI*2);
  ctx.stroke();
  ctx.setLineDash([]);
  // Dot
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(sx,sy,2,0,Math.PI*2);ctx.fill();
  // Strength arc
  ctx.strokeStyle=sculpt.invert?'rgba(255,100,60,0.8)':'rgba(100,220,100,0.8)';
  ctx.lineWidth=2.5;
  ctx.beginPath();
  ctx.arc(sx,sy,sculpt.radius-3,-Math.PI/2,-Math.PI/2+Math.PI*2*sculpt.strength);
  ctx.stroke();
  // Label
  ctx.fillStyle='rgba(255,255,255,0.85)';
  ctx.font='bold 11px Inter,sans-serif';
  ctx.fillText(sculpt.brush,sx+sculpt.radius+6,sy+4);
  ctx.restore();
}

// ========== SYMMETRY ==========

// Mirror Object: creates a mirrored copy of the mesh and merges it
// This is the reliable "apply mirror modifier" approach
function mirrorObject(axis){
  if(!selectedObj){toast('Select an object');return;}
  pushUndo();
  const obj=selectedObj;
  const pivot=cursor3D;
  const vCount=obj.verts.length;

  // Duplicate and mirror all vertices
  const mirroredVerts=obj.verts.map(v=>V3(
    axis==='x'?2*pivot.x-v.x:v.x,
    axis==='y'?2*pivot.y-v.y:v.y,
    axis==='z'?2*pivot.z-v.z:v.z
  ));
  mirroredVerts.forEach(v=>obj.verts.push(v));

  // Duplicate faces with flipped winding (offset by vCount)
  const mirroredFaces=obj.faces.map(face=>
    [...face].reverse().map(i=>i+vCount)
  );
  mirroredFaces.forEach(f=>obj.faces.push(f));

  // Merge vertices that are very close (on the mirror plane)
  const threshold=0.001;
  const mergeMap=new Map();
  // For each mirrored vert, check if original vert is at same position
  for(let i=vCount;i<obj.verts.length;i++){
    for(let j=0;j<vCount;j++){
      if(v3len(v3sub(obj.verts[i],obj.verts[j]))<threshold){
        mergeMap.set(i,j);
        break;
      }
    }
  }

  // Remap faces to use merged verts
  if(mergeMap.size>0){
    obj.faces=obj.faces.map(face=>
      [...new Set(face.map(vi=>mergeMap.has(vi)?mergeMap.get(vi):vi))]
    ).filter(f=>f.length>=3);

    // Remove merged verts
    const removeSet=new Set(mergeMap.keys());
    const oldToNew=[];
    let cur=0;
    for(let i=0;i<obj.verts.length;i++){
      oldToNew.push(removeSet.has(i)?-1:cur++);
    }
    obj.verts=obj.verts.filter((_,i)=>!removeSet.has(i));
    obj.faces=obj.faces.map(f=>f.map(vi=>oldToNew[vi]).filter(vi=>vi>=0)).filter(f=>f.length>=3);
  }

  rebuildEdges(obj);
  editSelection.clear();
  toast('Mirrored on '+axis.toUpperCase()+' ✓ — '+obj.verts.length+' verts');
  render();
}

function toggleSym(axis){
  symmetry[axis]=!symmetry[axis];
  const active=symmetry[axis];
  ['sym-','sp-'].forEach(prefix=>{
    const btn=document.getElementById(prefix+axis);
    if(btn) btn.classList.toggle('btn-quad-active', active);
  });
  toast('Mirror '+axis.toUpperCase()+': '+(active?'ON':'OFF'));
  render();
}

function place3DCursor(mx,my){
  // Unproject mouse to find world position on the grid plane (Y=0)
  const {vx,vy,vw,vh,cam}=getActiveViewport();
  const lx=mx-vx, ly=my-vy;
  // Use projectIn inverse: find world point at Y=0 plane
  const camX=cam.target.x+cam.distance*Math.cos(cam.elevation)*Math.sin(cam.azimuth);
  const camY=cam.target.y+cam.distance*Math.sin(cam.elevation);
  const camZ=cam.target.z+cam.distance*Math.cos(cam.elevation)*Math.cos(cam.azimuth);
  const camPos=V3(camX,camY,camZ);
  const forward=v3norm(v3sub(cam.target,camPos));
  const up=V3(0,1,0);
  const right=v3norm(v3cross(forward,up));
  const actualUp=v3cross(right,forward);
  // Screen to NDC
  const ndcX=(lx-vw/2)/(vw/2);
  const ndcY=-(ly-vh/2)/(vh/2);
  let rayDir;
  if(cam.ortho){
    const scale=cam.distance*1.2/Math.min(vw,vh)*2;
    const worldX=ndcX*vw*scale/2;
    const worldY=ndcY*vh*scale/2;
    const origin=v3add(camPos,v3add(v3mul(right,worldX),v3mul(actualUp,worldY)));
    rayDir=forward;
    // Intersect Y=0 plane
    if(Math.abs(forward.y)>0.0001){
      const t=-origin.y/forward.y;
      cursor3D=v3add(origin,v3mul(forward,t));
    }
  } else {
    const fov=Math.PI/3;
    const aspect=vw/vh;
    const tanHalfFov=Math.tan(fov/2);
    rayDir=v3norm(v3add(v3add(forward,v3mul(right,ndcX*tanHalfFov*aspect)),v3mul(actualUp,ndcY*tanHalfFov)));
    if(Math.abs(rayDir.y)>0.0001){
      const t=-camPos.y/rayDir.y;
      if(t>0) cursor3D=v3add(camPos,v3mul(rayDir,t));
    }
  }
  cursor3D.y=0; // snap to Y=0 plane
  toast('3D Cursor: '+cursor3D.x.toFixed(2)+', '+cursor3D.z.toFixed(2));
  render();
}

// Mirror a vertex position across cursor on active symmetry axes
function mirrorVert(v){
  let mx=v.x, my=v.y, mz=v.z;
  if(symmetry.x) mx=2*cursor3D.x-v.x;
  if(symmetry.y) my=2*cursor3D.y-v.y;
  if(symmetry.z) mz=2*cursor3D.z-v.z;
  return V3(mx,my,mz);
}

// Apply symmetry after any edit operation that moved vertices
// Build mirror index map for the object on each symmetry axis
// Returns Map: vertIndex -> mirrorVertIndex (may be same if on mirror plane)
// ========== MIRROR MODIFIER ==========
// Creates a full mirrored copy of mesh geometry (Blender Mirror Modifier style)
// Pivot = cursor3D. Applied non-destructively on export / on demand.

function applyMirrorModifier(obj){
  if(!symmetry.x&&!symmetry.y&&!symmetry.z){toast('Enable a symmetry axis first');return;}
  pushUndo();

  const pivot=cursor3D;
  const origVertCount=obj.verts.length;
  const origFaceCount=obj.faces.length;

  // For each active axis, duplicate and mirror
  ['x','y','z'].forEach(axis=>{
    if(!symmetry[axis]) return;
    const curVertCount=obj.verts.length;

    // Duplicate all verts, mirroring on this axis
    const newVertsStart=obj.verts.length;
    obj.verts.forEach(v=>{
      obj.verts.push(V3(
        axis==='x'?2*pivot.x-v.x:v.x,
        axis==='y'?2*pivot.y-v.y:v.y,
        axis==='z'?2*pivot.z-v.z:v.z
      ));
    });

    // Duplicate faces with mirrored vertex indices and reversed winding
    const facesToMirror=obj.faces.slice(0,curVertCount>origVertCount?origFaceCount:obj.faces.length);
    facesToMirror.forEach(face=>{
      // Reverse winding for correct normals on mirrored side
      obj.faces.push([...face].reverse().map(vi=>vi+newVertsStart));
    });
  });

  // Weld vertices on the mirror seam (within threshold)
  weldVertices(obj, 0.002);
  rebuildEdges(obj);
  toast('Mirror applied: '+obj.verts.length+' verts, '+obj.faces.length+' faces');
  render();
}

function weldVertices(obj, threshold){
  const n=obj.verts.length;
  const remap=new Array(n);
  for(let i=0;i<n;i++) remap[i]=i;

  // Simple O(n²) weld — fine for typical mesh sizes
  for(let i=0;i<n;i++){
    if(remap[i]!==i) continue;
    for(let j=i+1;j<n;j++){
      if(remap[j]!==j) continue;
      if(v3len(v3sub(obj.verts[i],obj.verts[j]))<threshold){
        remap[j]=i;
      }
    }
  }

  // Remap to compact indices
  const kept=[];
  const compact=new Array(n);
  for(let i=0;i<n;i++){
    const ri=remap[i];
    if(ri===i){compact[i]=kept.length;kept.push(obj.verts[i]);}
    else compact[i]=compact[remap[i]];
  }

  obj.verts=kept;
  obj.faces=obj.faces.map(face=>{
    const nf=[...new Set(face.map(vi=>compact[vi]))];
    return nf.length>=3?nf:null;
  }).filter(Boolean);
}

// Find mirror partner for a vertex: looks for existing vert near mirrored position
// Returns -1 if none found within threshold
function findMirrorVert(obj, vi, axis, pivot, threshold=0.15){
  const v=obj.verts[vi];
  const mx=axis==='x'?2*pivot.x-v.x:v.x;
  const my=axis==='y'?2*pivot.y-v.y:v.y;
  const mz=axis==='z'?2*pivot.z-v.z:v.z;
  // If vertex is on the mirror plane, no partner
  const dist=axis==='x'?Math.abs(v.x-pivot.x):axis==='y'?Math.abs(v.y-pivot.y):Math.abs(v.z-pivot.z);
  if(dist<threshold*0.1) return vi; // on plane — mirror to self
  let bestVi=-1, bestD=threshold;
  obj.verts.forEach((v2,j)=>{
    if(j===vi) return;
    const d=Math.sqrt((v2.x-mx)**2+(v2.y-my)**2+(v2.z-mz)**2);
    if(d<bestD){bestD=d;bestVi=j;}
  });
  return bestVi;
}

// Get mirrored position of a vertex
function getMirrorPos(v, axis, pivot){
  return V3(
    axis==='x'?2*pivot.x-v.x:v.x,
    axis==='y'?2*pivot.y-v.y:v.y,
    axis==='z'?2*pivot.z-v.z:v.z
  );
}

// Apply symmetry: for each vert in movedSet, reflect it onto its mirror partner
// If no partner exists, create one (add new vert + duplicate faces)
function applySymmetry(obj, movedSet){
  if(!symmetry.x&&!symmetry.y&&!symmetry.z) return;
  if(!movedSet||movedSet.size===0) return;
  const axes=['x','y','z'].filter(a=>symmetry[a]);
  axes.forEach(axis=>{
    const pivot=cursor3D;
    movedSet.forEach(vi=>{
      const mi=findMirrorVert(obj,vi,axis,pivot);
      if(mi===vi) return; // on plane
      if(mi>=0){
        // Partner exists — move it to mirror position
        obj.verts[mi]=getMirrorPos(obj.verts[vi],axis,pivot);
      }
      // If no partner: only move src, don't create (user should use Mirror Object)
    });
  });
}

// Draw 3D cursor in viewport
function draw3DCursor(W,H){
  const p=project(cursor3D,W,H);
  if(!p) return;
  const sz=10;
  ctx.save();
  ctx.strokeStyle='#e0e0e0';
  ctx.lineWidth=1;
  // Cross
  ctx.beginPath();ctx.moveTo(p.x-sz,p.y);ctx.lineTo(p.x+sz,p.y);ctx.stroke();
  ctx.beginPath();ctx.moveTo(p.x,p.y-sz);ctx.lineTo(p.x,p.y+sz);ctx.stroke();
  // Circle
  ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);
  ctx.strokeStyle='#ff6b35';ctx.lineWidth=1.5;ctx.stroke();
  // Symmetry axis indicators
  if(symmetry.x||symmetry.y||symmetry.z){
    ctx.fillStyle='rgba(255,107,53,0.15)';
    ctx.font='9px Inter,sans-serif';
    ctx.fillStyle='#ff6b35';
    const axes=[];
    if(symmetry.x)axes.push('X');
    if(symmetry.y)axes.push('Y');
    if(symmetry.z)axes.push('Z');
    ctx.fillText(axes.join('+'),p.x+8,p.y-8);
  }
  ctx.restore();
}

function drawSymPlane(W,H){
  if(!symmetry.x&&!symmetry.z) return;
  const size=8;
  ctx.save();
  ctx.globalAlpha=0.12;
  if(symmetry.x){
    // Draw X mirror plane (vertical plane at cursor.x)
    const pts=[];
    for(let z=-size;z<=size;z+=size){
      for(let y=-size;y<=size;y+=size){
        const p=project(V3(cursor3D.x,y,z),W,H);
        if(p)pts.push(p);
      }
    }
    if(pts.length>=3){
      ctx.fillStyle='#ff453a';
      ctx.beginPath();
      const corners=[
        project(V3(cursor3D.x,-size,-size),W,H),
        project(V3(cursor3D.x,-size,size),W,H),
        project(V3(cursor3D.x,size,size),W,H),
        project(V3(cursor3D.x,size,-size),W,H),
      ].filter(Boolean);
      if(corners.length>=3){
        ctx.moveTo(corners[0].x,corners[0].y);
        corners.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));
        ctx.closePath();ctx.fill();
      }
    }
  }
  if(symmetry.z){
    ctx.fillStyle='#4da3ff';
    const corners=[
      project(V3(-size,0,cursor3D.z),W,H),
      project(V3(size,0,cursor3D.z),W,H),
      project(V3(size,size*2,cursor3D.z),W,H),
      project(V3(-size,size*2,cursor3D.z),W,H),
    ].filter(Boolean);
    if(corners.length>=3){
      ctx.beginPath();
      ctx.moveTo(corners[0].x,corners[0].y);
      corners.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));
      ctx.closePath();ctx.fill();
    }
  }
  ctx.globalAlpha=1;
  ctx.restore();
}

// ========== MODAL GIZMO (Blender style G/R/S) ==========
function snapshotState(){
  if(!selectedObj)return null;
  if(mode==='object'){
    return {
      mode:'object',
      position:V3(selectedObj.position.x,selectedObj.position.y,selectedObj.position.z),
      rotation:V3(selectedObj.rotation.x,selectedObj.rotation.y,selectedObj.rotation.z),
      scale:V3(selectedObj.scale.x,selectedObj.scale.y,selectedObj.scale.z)
    };
  } else {
    return {
      mode:'edit',
      verts:selectedObj.verts.map(v=>V3(v.x,v.y,v.z))
    };
  }
}

function restoreState(snap){
  if(!selectedObj||!snap)return;
  if(snap.mode==='object'){
    selectedObj.position=V3(snap.position.x,snap.position.y,snap.position.z);
    selectedObj.rotation=V3(snap.rotation.x,snap.rotation.y,snap.rotation.z);
    selectedObj.scale=V3(snap.scale.x,snap.scale.y,snap.scale.z);
  } else {
    selectedObj.verts=snap.verts.map(v=>V3(v.x,v.y,v.z));
  }
}

function startGizmo(type){
  if(!selectedObj)return;
  if(mode==='edit'&&editSelection.size===0){toast('Select an element first');return;}
  pushUndo();
  gizmo.active=true;
  gizmo.type=type;
  gizmo.axis=null;
  gizmo.startMouse={x:mousePos.x,y:mousePos.y};
  gizmo.lastMouse={x:mousePos.x,y:mousePos.y};
  gizmo.startState=snapshotState();
  gizmo.snapBase=null;
  // Set the tool visually
  setTool(type);
  render();
}

function getGizmoAffectedVerts(){
  // Returns array of vertex indices to transform
  const obj=selectedObj;
  const idxList=[...editSelection];
  const affected=new Set();
  if(subMode==='vertex') idxList.forEach(i=>affected.add(i));
  else if(subMode==='edge') idxList.forEach(ei=>obj.edges[ei].forEach(vi=>affected.add(vi)));
  else if(subMode==='face') idxList.forEach(fi=>obj.faces[fi].forEach(vi=>affected.add(vi)));
  return [...affected];
}

function updateGizmo(mx,my){
  if(!gizmo.active||!selectedObj)return;

  // Delta from last frame (incremental — never restores state, safe after extrude)
  const fdx=mx-gizmo.lastMouse.x;
  const fdy=my-gizmo.lastMouse.y;
  gizmo.lastMouse={x:mx,y:my};
  if(fdx===0&&fdy===0)return;

  const {right,up}=getViewMatrix();
  const speed=camera.distance*0.007;

  if(gizmo.type==='move'){
    let delta;
    if(gizmo.axis==='x')      delta=V3(fdx*speed,0,0);
    else if(gizmo.axis==='y') delta=V3(0,-fdy*speed,0);
    else if(gizmo.axis==='z') delta=V3(0,0,fdx*speed);
    else                       delta=v3add(v3mul(right,fdx*speed),v3mul(up,-fdy*speed));

    if(mode==='object'){
      selectedObj.position=v3add(selectedObj.position,delta);
      updateTransformPanel();
    } else {
      const mObj=getObjectMatrix(selectedObj);
      const mInv=invertMat4Simple(mObj);
      getGizmoAffectedVerts().forEach(vi=>{
        const wv=mat4transform(mObj,selectedObj.verts[vi]);
        selectedObj.verts[vi]=mat4transform(mInv,v3add(wv,delta));
      });
    }

  } else if(gizmo.type==='rotate'){
    const angle=(fdx+fdy)*0.012;
    if(mode==='object'){
      const ax=gizmo.axis||'y';
      if(ax==='x') selectedObj.rotation.x+=angle;
      else if(ax==='z') selectedObj.rotation.z+=angle;
      else selectedObj.rotation.y+=angle;
      updateTransformPanel();
    } else {
      const affVerts=getGizmoAffectedVerts();
      const cen=affVerts.reduce((s,vi)=>v3add(s,selectedObj.verts[vi]),V3(0,0,0));
      const pivot=v3mul(cen,1/affVerts.length);
      const cosA=Math.cos(angle),sinA=Math.sin(angle);
      const ax=gizmo.axis||'y';
      affVerts.forEach(vi=>{
        const r=v3sub(selectedObj.verts[vi],pivot);
        let nv;
        if(ax==='x')      nv=V3(r.x, r.y*cosA-r.z*sinA, r.y*sinA+r.z*cosA);
        else if(ax==='z') nv=V3(r.x*cosA+r.y*sinA,-r.x*sinA+r.y*cosA,r.z);
        else              nv=V3(r.x*cosA-r.z*sinA,r.y,r.x*sinA+r.z*cosA);
        selectedObj.verts[vi]=v3add(pivot,nv);
      });
    }

  } else if(gizmo.type==='scale'){
    const factor=Math.max(0.01,1+(fdx-fdy)*0.008);
    if(mode==='object'){
      if(gizmo.axis==='x')      selectedObj.scale.x*=factor;
      else if(gizmo.axis==='y') selectedObj.scale.y*=factor;
      else if(gizmo.axis==='z') selectedObj.scale.z*=factor;
      else { selectedObj.scale.x*=factor;selectedObj.scale.y*=factor;selectedObj.scale.z*=factor; }
      updateTransformPanel();
    } else {
      const affVerts=getGizmoAffectedVerts();
      const cen=affVerts.reduce((s,vi)=>v3add(s,selectedObj.verts[vi]),V3(0,0,0));
      const pivot=v3mul(cen,1/affVerts.length);
      affVerts.forEach(vi=>{
        const r=v3sub(selectedObj.verts[vi],pivot);
        let scaled;
        if(gizmo.axis==='x')      scaled=V3(r.x*factor,r.y,r.z);
        else if(gizmo.axis==='y') scaled=V3(r.x,r.y*factor,r.z);
        else if(gizmo.axis==='z') scaled=V3(r.x,r.y,r.z*factor);
        else                       scaled=v3mul(r,factor);
        selectedObj.verts[vi]=v3add(pivot,scaled);
      });
    }
  }
  // Live symmetry mirror during drag
  if(selectedObj&&(symmetry.x||symmetry.y||symmetry.z)){
    if(mode==='edit'){
      applySymmetry(selectedObj, new Set(getGizmoAffectedVerts()));
    } else if(mode==='object'){
      // Object mode: mirror the whole object's verts around cursor
      const allVerts=new Set([...Array(selectedObj.verts.length).keys()]);
      applySymmetry(selectedObj, allVerts);
    }
  }
  render();
}

function confirmGizmo(){
  gizmo.active=false;
  gizmo.startState=null;
  // Apply symmetry if any axis active
  if(selectedObj&&(symmetry.x||symmetry.y||symmetry.z)){
    const moved=mode==='edit'
      ? new Set(getGizmoAffectedVerts())
      : new Set([...Array(selectedObj.verts.length).keys()]);
    applySymmetry(selectedObj,moved);
  }
  toast('Applied ✓');
  render();
}

function cancelGizmo(){
  if(!gizmo.active)return;
  // Undo the pushUndo we did at startGizmo — pop last undo entry and restore
  if(undoStack.length>0){
    const {state,sel}=undoStack.pop();
    objects=JSON.parse(state);
    selectedObj=sel?objects.find(o=>o.id===sel)||null:null;
    editSelection.clear();
    updateObjList();
    updateTransformPanel();
  }
  gizmo.active=false;
  gizmo.startState=null;
  toast('Cancelled');
  render();
}

// ========== SIMPLE MAT4 INVERSE (for TRS matrices) ==========
function invertMat4Simple(m){
  // For TRS matrix, approximate inverse via transpose of rotation part
  // This is a simplified version good enough for vertex editing
  const tx=m[3],ty=m[7],tz=m[11];
  const inv=[
    m[0],m[4],m[8],-(m[0]*tx+m[4]*ty+m[8]*tz),
    m[1],m[5],m[9],-(m[1]*tx+m[5]*ty+m[9]*tz),
    m[2],m[6],m[10],-(m[2]*tx+m[6]*ty+m[10]*tz),
    0,0,0,1
  ];
  return inv;
}

// ========== TOAST ==========
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.style.opacity=1;
  clearTimeout(toast._t);
  toast._t=setTimeout(()=>el.style.opacity=0,2000);
}

// ========== RESIZE ==========
function resize(){
  const vp=document.getElementById('viewport');
  canvas.width=vp.clientWidth;
  canvas.height=vp.clientHeight;
  const lc=document.getElementById('lasso-canvas');
  if(lc){lc.width=canvas.width;lc.height=canvas.height;}
  render();
}

// ========== INIT ==========
canvas=document.getElementById('c');
ctx=canvas.getContext('2d');
initEvents();
initLasso();
initTouchEvents();
window.addEventListener('resize',resize);
resize();

// Start with a default cube
addMesh('cube');
setSculptBrush('draw'); // init sculpt UI
// Show mobile hints
if('ontouchstart' in window){
  const h=document.getElementById('sculpt-touch-hint');
  if(h) h.style.display='block';
}
toast('Welcome! 1:Face  2:Edge  3:Vertex  4:Object  G/W:Move  R:Rotate  S:Scale');
</script>
